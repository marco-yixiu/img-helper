name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python (x86_64 via Rosetta)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install dependencies
        run: pip install Pillow pyinstaller

      - name: Build
        run: python -m PyInstaller --windowed --name "小包图片助手" --clean -y run_tool.py

      - name: Zip app bundle
        run: cd dist && zip -r ../mac-app.zip "小包图片助手.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: mac-app.zip
